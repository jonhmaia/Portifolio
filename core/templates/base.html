{% load static %}
{% load i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Portfólio - João Marcos{% endblock %}</title>
  <link rel="icon" type="image/png" href="https://img.icons8.com/windows/32/dev.png">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Portfólio de João Marcos Maia - Desenvolvedor Full Stack com experiência em liderança técnica e soluções digitais.">
  <meta property="og:title" content="João Marcos Maia – Desenvolvedor Full Stack">
  <meta property="og:description" content="Experiência em desenvolvimento web, coordenação técnica e produtos digitais.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@master/devicon.min.css">


  <style>
    body {
      background-color: #121212;
      color: #fff;
    }

    .card,
    .accordion-item,
    .accordion-button,
    .accordion-body,
    .list-group-item,
    footer,
    nav,
    .navbar {
      background-color: #181818 !important;
      color: #ffffff !important;
      border-color: #333 !important;
    }

    .accordion-button::after {
      filter: invert(1);
    }

    .accordion-button:not(.collapsed) {
      box-shadow: none;
    }

    .btn {
      color: #fff;
      border-color: #ccc;
    }

    .btn:hover {
      background-color: #333;
    }

    .navbar-brand {
      color: #fff !important;
    }

    footer {
      border-top: 1px solid #333;
    }

    body, .card, .accordion-item, .accordion-button, .accordion-body, .list-group-item {
      transition: background-color 0.3s ease, color 0.3s ease;
    }
     /* Hover personalizado para botões */
  .btn-primary:hover,
  .btn-outline-light:hover,
  .btn-dark:hover {
    background-color: #ff8c00 !important;
    border-color: #ff8c00 !important;
    color: #fff !important;
  }

  /* Para manter coerência com bordas claras */
  .btn-outline-light {
    color: #fff;
    border-color: #ccc;
  }

  .btn-outline-light:hover {
    background-color: #ff8c00;
    border-color: #ff8c00;
    color: #fff;
  }
  a:hover{
    color: #ff8c00 !important;
    
  }

  .project-card {
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .project-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 20px rgba(255, 140, 0, 0.5);
  }

  .badge {
    font-size: 0.75rem;
    border-radius: 12px;
  }
  .python-badge           { background-color: #306998; color: #fff; }
  .django-badge           { background-color: #092E20; color: #fff; }
  .tailwind-badge         { background-color: #38BDF8; color: #000; }
  .bootstrap-badge        { background-color: #7952B3; color: #fff; }
  .supabase-badge         { background-color: #3ECF8E; color: #000; }
  .gcc-badge              { background-color: #FF5733; color: #fff; }
  .terminal-badge         { background-color: #009439; color: #fff; }
  .c-badge                { background-color: #0156b8; color: #000; }
  .notacao-cientifica-badge { background-color: #ff9800; color: #000; }
  .uiux-badge             { background-color: #ff69b4; color: #000; }
  .tad-badge              { background-color: #FFB703; color: #000; }
  .matemática-badge       { background-color: #FF6F61; color: #fff; }
  .godot-badge           { background-color: #58B368; color: #fff; }
  .pixelart-badge         { background-color: #FF6F61; color: #fff; }
  .jogos-badge           { background-color: #f201fa; color: #fff; }

  
  </style>
</head>

<body class="bg-black text-white d-flex flex-column min-vh-100">

  <nav class="navbar navbar-expand-lg shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{% url 'home' %}">João Marcos Maia</a>

      <div class="d-flex ms-auto align-items-center gap-2">

        <div class="d-flex ms-auto align-items-center gap-2">

          <!-- Botão para português (seta explicitamente pt-br) -->
          <form action="{% url 'set_language' %}" method="post">
            {% csrf_token %}
            <input type="hidden" name="language" value="pt-br">
            <input type="hidden" name="next" value="{{ request.path }}">
            <button type="submit" class="btn btn-link p-0 border-0" title="Português">
              <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4a/Brazilian_flag_icon_round.svg/1200px-Brazilian_flag_icon_round.svg.png" alt="Português" width="32">
            </button>
          </form>
        
          <!-- Botão para inglês -->
          <form action="{% url 'set_language' %}" method="post">
            {% csrf_token %}
            <input type="hidden" name="language" value="en">
            <input type="hidden" name="next" value="{{ request.path }}">
            <button type="submit" class="btn btn-link p-0 border-0" title="English">
              <img src="https://cdn-icons-png.flaticon.com/512/3909/3909383.png" alt="English" width="32">
            </button>
          </form>
        
        </div>
      
        
      </form>
      
      
      
    </div>
  </nav>

  <main class="container my-5 flex-grow-1" id="main">
    {% block content %}{% endblock %}
  </main>

  <footer class="text-center py-4 bg-dark shadow-sm text-white mt-auto">
    <div class="container mb-2">
      <a href="https://github.com/jonhmaia" target="_blank" class="text-white mx-2 fs-4" title="GitHub">
        <i class="bi bi-github"></i>
      </a>
      <a href="https://www.linkedin.com/in/joaomarcosmaia" target="_blank" class="text-white mx-2 fs-4" title="LinkedIn">
        <i class="bi bi-linkedin"></i>
      </a>
      <a href="mailto:joaomarcosaraujomaia14@gmail.com" class="text-white mx-2 fs-4" title="Email">
        <i class="bi bi-envelope-fill"></i>
      </a>
    </div>
    <div>
      © {{ now|date:"Y" }} João Marcos Maia. All rights reserved.
    </div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Swiper JS -->
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
  const swiper = new Swiper('.swiper', {
    slidesPerView: 'auto',
    spaceBetween: 30,
    centeredSlides: true,
    loop: true,
    autoplay: {
      delay: 2000,
      disableOnInteraction: false,
    },
  });
</script>


</body>
</html>
