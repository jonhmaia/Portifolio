{% load static %}
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Portfólio - João Marcos{% endblock %}</title>
  <link rel="icon" type="image/png" href="{% static 'core/logo.png' %}">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Portfólio de João Marcos Maia - Desenvolvedor Full Stack com experiência em liderança técnica e soluções digitais.">
  <meta property="og:title" content="João Marcos Maia – Desenvolvedor Full Stack">
  <meta property="og:description" content="Experiência em desenvolvimento web, coordenação técnica e produtos digitais.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>


  <!-- Estilos -->

</head>
  <style>
    body {
      background-color: #121212;
      color: #fff;
    }

    .card,
    .accordion-item,
    .accordion-button,
    .accordion-body,
    .list-group-item,
    footer,
    nav,
    .navbar {
      background-color: #1e1e1e !important;
      color: #ffffff !important;
      border-color: #333 !important;
    }

    .accordion-button::after {
      filter: invert(1); /* seta branca */
    }

    .accordion-button:not(.collapsed) {
      box-shadow: none;
    }

    .btn {
      color: #fff;
      border-color: #ccc;
    }

    .btn:hover {
      background-color: #333;
    }

    .navbar-brand {
      color: #fff !important;
    }

    footer {
      border-top: 1px solid #333;
    }

    body, .card, .accordion-item, .accordion-button, .accordion-body, .list-group-item {
      transition: background-color 0.3s ease, color 0.3s ease;
    }
  </style>
<body class="bg-dark text-white">

  <nav class="navbar navbar-expand-lg shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">João Marcos Maia</a>
    </div>
  </nav>

  <main class="container my-5" id="main">
    {% block content %}{% endblock %}
  </main>

  <footer class="text-center py-4  text-white">
    © {{ now|date:"Y" }} João Marcos Maia. Todos os direitos reservados.
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
